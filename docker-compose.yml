services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_API_TIMEOUT: ${VITE_API_TIMEOUT:-30000}
        VITE_APP_NAME: ${VITE_APP_NAME:-Web Crawler Test Generator}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_ENABLE_ANALYTICS: ${VITE_ENABLE_ANALYTICS:-false}
        VITE_ENABLE_DEBUG_MODE: ${VITE_ENABLE_DEBUG_MODE:-false}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_OCR_API_BASE_URL: ${VITE_OCR_API_BASE_URL:-http://localhost:8001}
    ports:
      - '${FRONTEND_PORT:-8080}:80'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', '-s', 'http://127.0.0.1/health']
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 15s
